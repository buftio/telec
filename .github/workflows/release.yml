name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile
      - shell: bash
        run: |
          set -euo pipefail
          source scripts/release-config.sh

          if [[ "${GITHUB_REF_NAME}" != "${TELEC_RELEASE_TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version tag ${TELEC_RELEASE_TAG}" >&2
            exit 1
          fi
      - shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from origin/main" >&2
            exit 1
          fi
      - shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/release-config.sh
          bash -n scripts/validate-homebrew-formula.sh
      - run: bun run check
      - run: bun test

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            artifact: telec-darwin-arm64
            binary: dist/telec-darwin-arm64
          - os: ubuntu-24.04
            target: linux-x64
            artifact: telec-linux-x64
            binary: dist/telec-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  publish:
    needs:
      - preflight
      - build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: telec-*
          merge-multiple: true
      - run: bun run package:release
      - run: bun run formula:release
      - shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          set -euo pipefail
          bash ./scripts/validate-homebrew-formula.sh
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .local/releases/${{ github.ref_name }}/*.tar.gz
            .local/releases/${{ github.ref_name }}/checksums.txt
            .local/releases/${{ github.ref_name }}/telec.rb
      - run: npm publish --access public --provenance
      - if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
        run: |
          set -euo pipefail
          source scripts/release-config.sh

          TAP_REPO="${HOMEBREW_TAP_REPOSITORY:-$TELEC_HOMEBREW_TAP_REPOSITORY_DEFAULT}"
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" "$TAP_DIR"
          mkdir -p "$TAP_DIR/Formula"
          bun run formula:release -- --output "$TAP_DIR/Formula/telec.rb"

          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "Formula/telec.rb"; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git add "Formula/telec.rb"
          git commit -m "formula(telec): update to ${GITHUB_REF_NAME}"
          git push
